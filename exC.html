<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Muscle Best</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    
    <style>
        :root {
            --bg-start: #ffb162;
            --bg-end: #ff9f18;
            --panel-bg: rgba(255, 255, 255, 0.2);
            --radius: 18px;
            --accent: #5c3d1a;
        }
        * { box-sizing: border-box; }
        body {
            background: linear-gradient(180deg, var(--bg-start) 0%, var(--bg-end) 100%);
            margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            color: var(--accent);
        }
        .app {
            width: 1194px; height: 834px;
            display: flex; padding: 30px; gap: 25px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px); border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* 左側：角色狀態 */
        .side-panel { width: 260px; display: flex; flex-direction: column; gap: 20px; }
        .info-card { background: var(--panel-bg); padding: 20px; border-radius: var(--radius); border: 1px solid rgba(255,255,255,0.4); }
        .tag { background: #C9A86C; color: #fff; padding: 4px 12px; border-radius: 6px; font-weight: bold; font-size: 14px; }
        .level-val { font-size: 32px; font-weight: 800; display: block; margin-top: 5px; }
        
        .xp-bar-outer { width: 100%; height: 12px; background: rgba(0,0,0,0.15); border-radius: 6px; overflow: hidden; margin-top: 10px; }
        .xp-bar-inner { height: 100%; width: 0%; background: linear-gradient(90deg, #8BB8A8, #5c3d1a); transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }

        /* 中間：相機與 AI */
        .main-view {
            flex: 1; position: relative; background: #000; border-radius: var(--radius);
            overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border: 5px solid transparent; transition: 0.3s;
        }
        #output_canvas { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        /* 視覺特效：護盾 */
        #shield-effect {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 300px; height: 300px; border: 4px solid #00FF94; border-radius: 50%;
            box-shadow: 0 0 30px #00FF94; opacity: 0; transition: 0.3s; pointer-events: none;
        }

        /* 中央倒數數字 */
        #countdownOverlay {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            pointer-events: none;
            background: radial-gradient(circle at center, rgba(0,0,0,0.35), transparent 60%);
            color: #FFE26A;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
            font-weight: 900;
        }
        #countdownOverlay .number {
            font-size: 128px;
            letter-spacing: 4px;
        }
        #countdownOverlay .sub {
            margin-top: 8px;
            font-size: 24px;
        }

        /* 右側：動作引導 */
        .guide-panel { width: 260px; display: flex; flex-direction: column; justify-content: center; gap: 20px; }
        .step-msg { font-size: 18px; font-weight: bold; text-align: center; height: 50px; }
        .cycle-progress {
            width: 100%; height: 250px; background: var(--panel-bg);
            border-radius: var(--radius); display: flex; flex-direction: column;
            align-items: center; justify-content: space-around; padding: 20px 0;
        }
        .dot { width: 20px; height: 20px; border-radius: 50%; background: rgba(0,0,0,0.1); transition: 0.3s; }
        .dot.active { background: #00D1FF; box-shadow: 0 0 15px #00D1FF; transform: scale(1.3); }

        /* 左側：角色圖片輪播 */
        .char-carousel {
            width: 100%;
            flex: 1;
            display: flex;
            align-items: stretch;
            justify-content: stretch;
            padding: 0;
        }
        .char-carousel .stage {
            width: 100%;
            flex: 1;
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.35);
            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
            background: rgba(0,0,0,0.12);
            position: relative;
        }
        .char-carousel img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transform: translateZ(0);
            opacity: 1;
            transition: opacity 180ms ease;
            display: block;
            position: absolute;
            inset: 0;
        }
        .char-carousel img.fade-out { opacity: 0.2; }
        .char-carousel .controls {
            width: 100%;
            position: absolute;
            inset: 0;
            pointer-events: auto;
        }
        .char-carousel .btn {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.35);
            background: rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.95);
            cursor: pointer;
            transition: 0.2s;
            user-select: none;
            font-weight: 900;
            line-height: 32px;
            pointer-events: auto;
        }
        .char-carousel .btn:hover { background: rgba(255,255,255,0.18); box-shadow: 0 0 14px rgba(255,255,255,0.12); }
        .char-carousel .btn:active { background: rgba(255,255,255,0.22); }
        .char-carousel .dots {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            pointer-events: auto;
        }

        /* 控制按鈕固定在左右中間 */
        #charPrev {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
        }
        #charNext {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
        }
        .char-carousel .c-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.25);
            border: 1px solid rgba(0,0,0,0.08);
            cursor: pointer;
            transition: 0.2s;
        }
        .char-carousel .c-dot.active {
            background: #00D1FF;
            box-shadow: 0 0 12px rgba(0,209,255,0.65);
            transform: scale(1.2);
        }
    </style>
</head>
<body>

<div class="app">
    <div class="side-panel">
        <div class="info-card">
            <span class="tag">C型：鬆軟泡芙人</span>
            <span id="levelText" class="level-val">LV.1</span>
            <div class="xp-bar-outer"><div id="xpFill" class="xp-bar-inner"></div></div>
            <div style="font-size: 12px; margin-top: 5px;" id="xpNum">XP: 0 / 100</div>
        </div>
        <div class="info-card" style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center;">
            <div class="char-carousel">
                <div class="stage" aria-label="角色圖片預覽">
                    <img id="charCarouselImg" alt="角色圖片" />
                </div>
            </div>
            <small style="margin-top:10px;">請慢慢呼吸，掌握好節奏</small>
        </div>
    </div>

    <div class="main-view" id="cameraBox">
        <video id="input_video" style="display:none;"></video>
        <canvas id="output_canvas"></canvas>
        <div id="shield-effect"></div>
        <div id="countdownOverlay">
            <div class="number">10</div>
            <div class="sub">秒後開始</div>
        </div>
    </div>

    <div class="guide-panel">
        <div id="statusMsg" class="step-msg">請對準相機<br>開始準備</div>
        <div class="cycle-progress">
            <small>循環階段</small>
            <div id="d1" class="dot"></div>
            <div id="d2" class="dot"></div>
            <div id="d3" class="dot"></div>
            <div id="d4" class="dot"></div>
            <div style="font-size: 24px; font-weight:bold;">深蹲: <span id="count">0</span> / <span id="target">?</span></div>
        </div>
    </div>
</div>

<script>
    const STORAGE_PREFIX = "mbSave:";
    const CURRENT_BODY_TYPE = "C";
    const DEFAULT_USER = "guest";
    const currentUser = localStorage.getItem("mbCurrentUser") || localStorage.getItem("qrLoginUser") || DEFAULT_USER;
    const saveKey = STORAGE_PREFIX + currentUser;

    function loadSave() {
        try {
            const raw = localStorage.getItem(saveKey);
            const parsed = raw ? JSON.parse(raw) : null;
            const totalXp = Number(parsed && parsed.totalXp) || 0;
            const bodyType = (parsed && typeof parsed.bodyType === "string") ? parsed.bodyType.toUpperCase() : "";
            return { totalXp: Math.max(0, Math.floor(totalXp)), bodyType: bodyType };
        } catch (e) {
            return { totalXp: 0, bodyType: "" };
        }
    }

    function saveProgress(totalXp, bodyType) {
        localStorage.setItem(saveKey, JSON.stringify({
            totalXp: Math.max(0, Math.floor(totalXp)),
            bodyType: (bodyType || CURRENT_BODY_TYPE).toUpperCase()
        }));
    }

    const userSave = loadSave();
    let totalXp = userSave.totalXp;
    let bodyType = userSave.bodyType || CURRENT_BODY_TYPE;
    saveProgress(totalXp, bodyType);
    let level = Math.floor(totalXp / 100) + 1;
    let xp = totalXp % 100;
    let cycles = 0;
    let step = 0; // 0:站立 1:下蹲 2:拿槓站起 3:放下下蹲 4:放手站起(完成)

    // 統一任務：深蹲
    const currentTask = {
        name: '深蹲',
        steps: ['下蹲', '站起！', '下蹲'],
        done: '完成 1 下<br>XP +25'
    };

    // 本回合隨機目標次數（3～5 下），達成後跳轉 clear.html
    const TARGET_SQUATS = 3 + Math.floor(Math.random() * 3); // 3～5
    (function initTargetDisplay() {
        const el = document.getElementById('target');
        if (el) el.textContent = TARGET_SQUATS;
    })();

    // 角色圖片輪播（先用 placeholder，占位等你把真實圖片路徑/URL 貼上即可）
    function placeholderDataUri(label, hue = 32) {
        const bg1 = `hsl(${hue}, 90%, 55%)`;
        const bg2 = `hsl(${(hue + 60) % 360}, 90%, 45%)`;
        const svg =
            `<svg xmlns='http://www.w3.org/2000/svg' width='400' height='400' viewBox='0 0 400 400'>` +
            `<defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'>` +
            `<stop offset='0' stop-color='${bg1}'/>` +
            `<stop offset='1' stop-color='${bg2}'/>` +
            `</linearGradient></defs>` +
            `<rect width='400' height='400' rx='28' fill='url(#g)'/>` +
            `<circle cx='200' cy='170' r='92' fill='rgba(255,255,255,0.25)'/>` +
            `<text x='50%' y='60%' font-family='Arial' font-size='44' text-anchor='middle' fill='rgba(255,255,255,0.92)'>${label}</text>` +
            `<text x='50%' y='79%' font-family='Arial' font-size='18' text-anchor='middle' fill='rgba(255,255,255,0.85)'>貼上你的角色圖</text>` +
            `</svg>`;
        return `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
    }

    // 這裡放輪播用的圖片（陣列每個元素一張圖）
    // 你的圖片：image/mu (1).png、image/mu (2).png
    // URL 的空白要用 %20，否則瀏覽器可能找不到檔案
    const characterImages = [
        "./image/mu%20(1).png",
        "./image/mu%20(2).png"
    ];

    let charCarouselIndex = 0;
    const charCarouselImg = document.getElementById('charCarouselImg');
    const charDotsEl = document.getElementById('charDots');
    const charPrevEl = document.getElementById('charPrev');
    const charNextEl = document.getElementById('charNext');

    function setCharCarouselIndex(nextIndex, { animate = true } = {}) {
        if (!characterImages.length || !charCarouselImg) return;
        const maxIndex = characterImages.length - 1;
        charCarouselIndex = Math.max(0, Math.min(maxIndex, nextIndex));

        // 簡單淡出再換圖，視覺更像輪播
        if (animate) {
            charCarouselImg.classList.add('fade-out');
            setTimeout(() => {
                charCarouselImg.src = characterImages[charCarouselIndex];
                charCarouselImg.classList.remove('fade-out');
            }, 90);
        } else {
            charCarouselImg.src = characterImages[charCarouselIndex];
        }

        // 同步點點
        if (charDotsEl) {
            const dots = charDotsEl.querySelectorAll('.c-dot');
            dots.forEach((d, i) => d.classList.toggle('active', i === charCarouselIndex));
        }
    }

    function initCharCarousel() {
        if (!charDotsEl) return;
        charDotsEl.innerHTML = '';

        characterImages.forEach((_, i) => {
            const dot = document.createElement('div');
            dot.className = 'c-dot' + (i === charCarouselIndex ? ' active' : '');
            dot.setAttribute('role', 'button');
            dot.setAttribute('tabindex', '0');
            dot.setAttribute('aria-label', `切換到第 ${i + 1} 張圖`);
            dot.addEventListener('click', () => setCharCarouselIndex(i));
            dot.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') setCharCarouselIndex(i);
            });
            charDotsEl.appendChild(dot);
        });

        // 初始顯示
        setCharCarouselIndex(0, { animate: false });
    }

    function setCharacterPreviewByLevel() {
        // 利用等級決定顯示哪張圖：LV.1 -> 第1張、LV.2 -> 第2張...（超出就固定在最後一張）
        if (!characterImages.length) return;
        const idx = Math.min(characterImages.length - 1, Math.max(0, level - 1));
        setCharCarouselIndex(idx);
    }

    // 初始化輪播
    initCharCarousel();

    // 自動輪播：每隔一段時間切下一張（滑鼠移入暫停）
    const CHAR_AUTOPLAY_MS = 2400;
    let charAutoplayTimer = null;
    let charAutoplayPaused = false;
    const charCarouselRoot = document.querySelector('.char-carousel');

    function stopCharAutoplay() {
        if (charAutoplayTimer) window.clearInterval(charAutoplayTimer);
        charAutoplayTimer = null;
    }

    function startCharAutoplay() {
        if (!characterImages.length) return;
        stopCharAutoplay();
        charAutoplayTimer = window.setInterval(() => {
            if (charAutoplayPaused) return;
            const nextIndex = (charCarouselIndex + 1) % characterImages.length;
            setCharCarouselIndex(nextIndex);
        }, CHAR_AUTOPLAY_MS);
    }

    if (charCarouselRoot) {
        charCarouselRoot.addEventListener('mouseenter', () => { charAutoplayPaused = true; });
        charCarouselRoot.addEventListener('mouseleave', () => { charAutoplayPaused = false; });
        charCarouselRoot.addEventListener('touchstart', () => { charAutoplayPaused = true; }, { passive: true });
        charCarouselRoot.addEventListener('touchend', () => { charAutoplayPaused = false; }, { passive: true });
        charCarouselRoot.addEventListener('touchcancel', () => { charAutoplayPaused = false; }, { passive: true });
    }

    if (charPrevEl) {
        charPrevEl.addEventListener('click', () => {
            const prevIndex = (charCarouselIndex - 1 + characterImages.length) % characterImages.length;
            setCharCarouselIndex(prevIndex);
        });
        charPrevEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                const prevIndex = (charCarouselIndex - 1 + characterImages.length) % characterImages.length;
                setCharCarouselIndex(prevIndex);
            }
        });
    }
    if (charNextEl) {
        charNextEl.addEventListener('click', () => {
            const nextIndex = (charCarouselIndex + 1) % characterImages.length;
            setCharCarouselIndex(nextIndex);
        });
        charNextEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                const nextIndex = (charCarouselIndex + 1) % characterImages.length;
                setCharCarouselIndex(nextIndex);
            }
        });
    }
    // 初始依照等級顯示
    setCharacterPreviewByLevel();
    startCharAutoplay();

    function handleXP(val) {
        totalXp += val;
        level = Math.floor(totalXp / 100) + 1;
        xp = totalXp % 100;
        saveProgress(totalXp, bodyType);
        document.getElementById('xpFill').style.width = xp + "%";
        document.getElementById('xpNum').innerText = `XP: ${xp} / 100`;
        document.getElementById('levelText').innerText = "LV." + level;
        setCharacterPreviewByLevel();
    }

    // 載入頁面時先把存檔資料套用到 UI
    document.getElementById('xpFill').style.width = xp + "%";
    document.getElementById('xpNum').innerText = `XP: ${xp} / 100`;
    document.getElementById('levelText').innerText = "LV." + level;

    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const cameraBox = document.getElementById('cameraBox');
    const shield = document.getElementById('shield-effect');

    function onResults(results) {
        canvasElement.width = videoElement.videoWidth;
        canvasElement.height = videoElement.videoHeight;
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

        if (results.poseLandmarks) {
            // 繪製簡潔的白色骨架
            drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: 'white', lineWidth: 2});
            
            const hip = results.poseLandmarks[24];
            const knee = results.poseLandmarks[26];
            const ankle = results.poseLandmarks[28];

            // 計算膝蓋角度（髖-膝-踝），回傳 0~180 度
            function calcAngleDeg(a, b, c) {
                const abx = a.x - b.x;
                const aby = a.y - b.y;
                const cbx = c.x - b.x;
                const cby = c.y - b.y;
                const dot = abx * cbx + aby * cby;
                const abLen = Math.hypot(abx, aby);
                const cbLen = Math.hypot(cbx, cby);
                if (!abLen || !cbLen) return 180;
                let cos = dot / (abLen * cbLen);
                cos = Math.max(-1, Math.min(1, cos));
                return Math.acos(cos) * (180 / Math.PI);
            }

            if (hip && knee && ankle) {
                const angleDeg = calcAngleDeg(hip, knee, ankle);
                // 角度越小表示膝蓋越彎（下蹲）
                const isSquat = angleDeg < 125;
                // 站立用較大的門檻做回彈（避免抖動）
                const isStand = angleDeg > 170;
                const msg = document.getElementById('statusMsg');

                // 核心循環邏輯（使用本回合隨機任務的文案）
                if (step === 0 && isSquat) {
                    step = 1; msg.innerHTML = currentTask.steps[0];
                    cameraBox.style.borderColor = "#4CAF50";
                } else if (step === 1 && isStand) {
                    step = 2; msg.innerHTML = currentTask.steps[1];
                    shield.style.opacity = "1"; // 負重時開啟護盾特效
                } else if (step === 2 && isSquat) {
                    step = 3; msg.innerHTML = currentTask.steps[2];
                    shield.style.opacity = "0";
                } else if (step === 3 && isStand) {
                    step = 0; cycles++;
                    document.getElementById('count').innerText = cycles;
                    msg.innerHTML = currentTask.done;
                    handleXP(25);
                    cameraBox.style.borderColor = "transparent";
                    if (cycles >= TARGET_SQUATS) {
                        msg.innerHTML = "目標達成！<br>前往結束畫面";
                        window.location.href = "clear.html";
                    }
                }

                // 更新點點 UI
                for(let i=1; i<=4; i++) {
                    document.getElementById('d'+i).className = (i <=
                     step) ? 'dot active' : 'dot';
                }
            }
        }
        canvasCtx.restore();
    }

    const pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
    pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
    pose.onResults(onResults);

    const camera = new Camera(videoElement, {
        onFrame: async () => { await pose.send({image: videoElement}); },
        width: 1280, height: 720
    });
    
    // 簡單倒數嗶聲：每秒一聲，最後一秒較高且稍長
    function playBeep(frequency = 800, duration = 120, volume = 0.2) {
        try {
            const AudioCtx = window.AudioContext || window.webkitAudioContext;
            const audioCtx = new AudioCtx();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(volume, audioCtx.currentTime);
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
            setTimeout(() => {
                oscillator.stop();
                audioCtx.close();
            }, duration);
        } catch (e) {
            // 若瀏覽器阻擋或不支援，則靜默失敗
        }
    }
    
    // 進入介面先倒數 10 秒，再開始啟動相機與循環（中央大字＋音效）
    let countdown = 10;
    const statusMsgEl = document.getElementById('statusMsg');
    const countdownOverlay = document.getElementById('countdownOverlay');
    const countdownNumEl = countdownOverlay.querySelector('.number');
    const countdownSubEl = countdownOverlay.querySelector('.sub');

    // 初始化顯示（含本回合隨機任務名稱與目標次數）
    statusMsgEl.innerHTML = "本回合：<strong>" + currentTask.name + "</strong><br>目標 " + TARGET_SQUATS + " 下，請對準相機";
    countdownOverlay.style.display = "flex";
    countdownNumEl.textContent = countdown;
    countdownSubEl.textContent = "秒後開始";
    playBeep(700, 150, 0.25);
    
    const countdownTimer = setInterval(() => {
        countdown--;
        if (countdown > 0) {
            countdownNumEl.textContent = countdown;
            // 每秒一個短嗶聲
            playBeep(700, 120, 0.25);
        } else {
            clearInterval(countdownTimer);
            countdownOverlay.style.display = "none";
            statusMsgEl.innerHTML = "本回合：<strong>" + currentTask.name + "</strong><br>目標 " + TARGET_SQUATS + " 下，開始！";
            // 最後一次給較高、稍長的提示音
            playBeep(1000, 250, 0.3);
            camera.start();
        } 
    }, 1000);
</script>

</body>
</html>
