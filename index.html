<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Muscle Best</title>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+TC:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style id="sections-styles">
/* CSS for section section:Landing */
#section-landing {
  width: 100%;
  display: flex;
  justify-content: center;
  padding: 20px;
  box-sizing: border-box;
}

.landing-container {
  width: 100%;
  max-width: 1194px;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
}

/* Logo Styles */
.logo-wrapper {
  z-index: 3;
  position: relative;
  /* Negative margin to pull the title up, matching Figma overlap */
  margin-bottom: -83px;
}

.logo-img {
  width: 298px;
  /* Ensure it doesn't overflow on small screens */
  max-width: 60vw; 
  filter: drop-shadow(4px 4px 4px rgba(0, 0, 0, 0.25));
}

/* Title Styles */
.title-wrapper {
  z-index: 1;
  position: relative;
}

.title-img {
  width: 600px;
  max-width: 90vw;
}

/* Button Styles */
.cta-button {
  z-index: 2;
  position: relative;
  /* Negative margin to pull button up into title area, matching Figma overlap */
  margin-top: -111px;
  
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  
  width: 300px;
  height: 80px;
  padding: 18px 0; /* Horizontal padding handled by width/centering */
  
  background-color: #974511;
  border: 3px solid #ffcc84;
  border-radius: 10px;
  box-shadow: 2px 2px 3px 0px rgba(0, 0, 0, 0.15);
  
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.cta-button:hover {
  transform: translateY(-2px);
  box-shadow: 2px 4px 6px 0px rgba(0, 0, 0, 0.2);
}

.cta-button:active {
  transform: translateY(0);
}

.btn-text {
  color: #ffffff;
  font-size: 24px; /* Estimated based on layout */
  font-weight: 700;
  letter-spacing: 1px;
}

/* Responsive Adjustments */
@media (max-width: 768px) {
  .logo-wrapper {
    margin-bottom: -40px;
  }
  
  .cta-button {
    margin-top: -60px;
    width: 240px;
    height: 64px;
  }
  
  .btn-text {
    font-size: 20px;
  }
}
  </style>
  <script src="global.js" defer></script>
</head>
<body>
<section id="section-landing">
  <div class="landing-container">
    <!-- Logo Image -->
    <div class="logo-wrapper">
      <img src="image/肌肉logo 1.png" alt="Muscle Best Logo" class="logo-img">
    </div>

    <!-- Title Graphic -->
    <div class="title-wrapper">
      <img src="image/Frame 10.png" alt="運動要不藥 Muscle Best" class="title-img">
    </div>

    <!-- CTA Button -->
  <a href="test3.html" style="text-decoration: none;">
  <button class="cta-button">
    <span class="btn-text">點擊進入</span>
  </button>
</a>
  </div>
</section>
</body>
</html>
